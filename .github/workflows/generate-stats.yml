name: Generate stats card

on:
  schedule:
    - cron: "17 2 * * *" # daily, 02:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/generate_stats.py
      - .github/workflows/generate-stats.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SVG
        run: python3 scripts/generate_stats.py
        env:
          # Optional STATS_TOKEN (a classic PAT with repo+read:user) also
          # counts private contributions; the built-in token sees public only.
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}
          GH_LOGIN: Thakur-Prateek

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: refresh stats card"
          git push
